name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint Typecheck And Validate
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tarka_sabha
      ENCRYPTION_KEY: ci_encryption_key_with_at_least_32_chars
      AUTH_SECRET: ci_auth_secret_with_at_least_32_chars
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Prisma Schema
        run: npm run prisma:validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
